<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>Luzardo Curso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/calendar.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-4">
  <div class="container">
    <h2 class="mb-4">📅 Calculadora de Término da Disciplina Regular</h2>
    <form class="row g-3" id="formRegular">
      <div class="col-md-4">
        <label class="form-label">Data de Início</label>
        <div class="d-flex gap-2">
          <input type="number" class="form-control" id="diaInicioRegular" placeholder="Dia" min="1" max="31">
          <input type="number" class="form-control" id="mesInicioRegular" placeholder="Mês" min="1" max="12">
        </div>
      </div>
      <div class="col-md-4">
        <label for="cargaHorariaRegular" class="form-label">Carga Horária Total</label>
        <input type="number" class="form-control" id="cargaHorariaRegular" value="100">
      </div>
      <div class="col-md-4">
        <label for="aulasPorDiaRegular" class="form-label">Aulas por Dia</label>
        <input type="number" class="form-control" id="aulasPorDiaRegular" value="2">
      </div>
      <div class="col-12">
        <label class="form-label d-block">Dias da Semana com Aula</label>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" value="1" id="segundaRegular">
          <label class="form-check-label" for="segundaRegular">Segunda</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" value="2" id="tercaRegular">
          <label class="form-check-label" for="tercaRegular">Terça</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" value="3" id="quartaRegular">
          <label class="form-check-label" for="quartaRegular">Quarta</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" value="4" id="quintaRegular">
          <label class="form-check-label" for="quintaRegular">Quinta</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" value="5" id="sextaRegular">
          <label class="form-check-label" for="sextaRegular">Sexta</label>
        </div>
      </div>
      <div class="col-12">
        <button type="button" class="btn btn-primary" onclick="calcular('arquivosdatas.txt', 'Regular')">Calcular Data Final</button>
      </div>
      <div class="col-12">
        <div id="resultadoRegular" class="alert alert-info text-dark bg-light mt-3" style="display:none;"></div>
      </div>
    </form>

    <hr class="my-5">

    <h2 class="mb-4">📅 Calculadora de Término da Disciplina EMI</h2>
    <form class="row g-3" id="formEMI">
      <div class="col-md-4">
        <label class="form-label">Data de Início</label>
        <div class="d-flex gap-2">
          <input type="number" class="form-control" id="diaInicioEMI" placeholder="Dia" min="1" max="31">
          <input type="number" class="form-control" id="mesInicioEMI" placeholder="Mês" min="1" max="12">
        </div>
      </div>
      <div class="col-md-4">
        <label for="cargaHorariaEMI" class="form-label">Carga Horária Total</label>
        <input type="number" class="form-control" id="cargaHorariaEMI" value="120">
      </div>
      <div class="col-md-4">
        <label for="aulasPorDiaEMI" class="form-label">Aulas por Dia</label>
        <input type="number" class="form-control" id="aulasPorDiaEMI" value="3">
      </div>
      <div class="col-12">
        <label class="form-label d-block">Dias da Semana com Aula</label>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" value="1" id="segundaEMI">
          <label class="form-check-label" for="segundaEMI">Segunda</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" value="2" id="tercaEMI">
          <label class="form-check-label" for="tercaEMI">Terça</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" value="3" id="quartaEMI">
          <label class="form-check-label" for="quartaEMI">Quarta</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" value="4" id="quintaEMI">
          <label class="form-check-label" for="quintaEMI">Quinta</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" value="5" id="sextaEMI">
          <label class="form-check-label" for="sextaEMI">Sexta</label>
        </div>
      </div>
      <div class="col-12">
        <button type="button" class="btn btn-success" onclick="calcular('arquivosdatasEMI.txt', 'EMI')">Calcular Data Final</button>
      </div>
      <div class="col-12">
        <div id="resultadoEMI" class="alert alert-info text-dark bg-light mt-3" style="display:none;"></div>
      </div>
    </form>
  </div>

  <script>
    const feriadosGlobais = { Regular: new Set(), EMI: new Set() };

    function carregarArquivoDatas(arquivo, tipo) {
      fetch(arquivo)
        .then(response => response.text())
        .then(texto => {
          const linhas = texto.trim().split('\n');
          linhas.forEach(linha => {
            const [tipoLinha, dataBr] = linha.trim().split(':');
            if (!tipoLinha || !dataBr) return;
            const [dia, mes] = dataBr.split('-');
            const ano = new Date().getFullYear();
            const dataIso = `${ano}-${mes.padStart(2, '0')}-${dia.padStart(2, '0')}`;
            if (tipoLinha === 'feriado') feriadosGlobais[tipo].add(dataIso);
          });
        })
        .catch(err => alert(`Erro ao carregar ${arquivo}`));
    }

    function formatarDataBR(data) {
      const dia = String(data.getDate()).padStart(2, '0');
      const mes = String(data.getMonth() + 1).padStart(2, '0');
      const ano = data.getFullYear();
      return `${dia}/${mes}/${ano}`;
    }

    function calcular(tipoArquivo, tipo) {
      const dia = parseInt(document.getElementById(`diaInicio${tipo}`).value);
      const mes = parseInt(document.getElementById(`mesInicio${tipo}`).value);
      const ano = new Date().getFullYear();
      const inicio = new Date(ano, mes - 1, dia);

      const cargaHoraria = parseInt(document.getElementById(`cargaHoraria${tipo}`).value);
      const aulasPorDia = parseInt(document.getElementById(`aulasPorDia${tipo}`).value);
      const diasSelecionados = [...document.querySelectorAll(`#form${tipo} input[type="checkbox"]:checked`)].map(cb => parseInt(cb.value));
      const diasNecessarios = Math.ceil(cargaHoraria / aulasPorDia);

      let dataAtual = new Date(inicio);
      let diasLetivos = 0;

      while (diasLetivos < diasNecessarios) {
        const dataStr = dataAtual.toISOString().split('T')[0];
        const diaSemana = dataAtual.getDay();

        if (!feriadosGlobais[tipo].has(dataStr) && diasSelecionados.includes(diaSemana)) {
          diasLetivos++;
        }

        dataAtual.setDate(dataAtual.getDate() + 1);
      }

      dataAtual.setDate(dataAtual.getDate() - 1);
      const resultado = document.getElementById(`resultado${tipo}`);
      resultado.innerHTML = `📆 Data final estimada: <strong>${formatarDataBR(dataAtual)}</strong> (${diasLetivos} dias letivos).`;
      resultado.style.display = 'block';
    }

    carregarArquivoDatas('arquivosdatas.txt', 'Regular');
    carregarArquivoDatas('arquivosdatasEMI.txt', 'EMI');
  </script>
</body>
</html>
